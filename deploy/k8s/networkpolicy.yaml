apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: llm-proxy-internal-only
  namespace: llm-proxy
spec:
  podSelector:
    matchLabels:
      app: llm-proxy
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              llm-proxy-access: "true"
      ports:
        - protocol: TCP
          port: 8080
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              name: llm
      ports:
        - protocol: TCP
          port: 3306
        - protocol: TCP
          port: 6379
        - protocol: TCP
          port: 443
        - protocol: TCP
          port: 80
