apiVersion: v1
kind: ConfigMap
metadata:
  name: llm-proxy-config
  namespace: llm-proxy
data:
  APP_ENV: production
  HTTP_ADDR: :8080
  DB_HOST: mariadb.llm.svc.cluster.local
  DB_PORT: "3306"
  DB_NAME: llm_proxy
  DB_USER: llm_proxy
  DB_MAX_OPEN_CONNS: "50"
  DB_MAX_IDLE_CONNS: "50"
  REDIS_ADDR: redis.llm.svc.cluster.local:6379
  WORKER_SYNC_INTERVAL_SEC: "30"
  WORKER_PROBE_TIMEOUT_SEC: "10"
  OIDC_ISSUER_URL: https://id.example.internal/realms/llm-proxy
  OIDC_CLIENT_ID: llm-proxy-admin
  OIDC_AUDIENCE: llm-proxy-admin-api
  OIDC_ADMIN_SCOPES: admin
  OIDC_ADMIN_ROLES: admin
